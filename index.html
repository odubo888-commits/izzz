<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酒馆 · 人设卡编辑器</title>
  <!-- pako 解压库（用于 iTXt 压缩块） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .app-container {
      width: 100%;
      max-width: 400px;
      background: #fff;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #eee;
      text-align: center;
      position: relative;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #333;
    }

    .back-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #333;
      display: none;
    }

    .back-btn.show {
      display: block;
    }

    .page {
      flex: 1;
      padding: 20px 16px;
      display: none;
      flex-direction: column;
    }

    .page.active {
      display: flex;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px 12px;
      margin-top: 40px;
      justify-items: center;
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      width: 100%;
      padding: 12px 4px;
      border-radius: 22px;
      background: #f9f9f9;
      user-select: none;
      color: #555;
    }

    .icon-item:active {
      transform: scale(0.92);
      background: #f0f0f0;
    }

    .icon-svg {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-svg svg {
      width: 100%;
      height: 100%;
    }

    .icon-label {
      font-size: 12px;
      font-weight: 500;
      color: #444;
      text-align: center;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 18px;
      color: #666;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
    }

    .input-group textarea {
      min-height: 100px;
    }

    .btn {
      padding: 12px 20px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:active {
      background: #555;
    }

    /* 世界书条目卡片 */
    .wb-card {
      background: #f9f9f9;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #eee;
    }

    .wb-card-header {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .wb-keys {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .wb-content {
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: #333;
    }

    /* 正则条目卡片 */
    .regex-card {
      background: #f9f9f9;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #eee;
      font-family: monospace;
      font-size: 13px;
    }

    .regex-card .label {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
    }

    .regex-find {
      color: #c0392b;
      word-break: break-all;
    }

    .regex-replace {
      color: #27ae60;
      word-break: break-all;
    }

    /* 空状态提示 */
    .empty-state {
      color: #aaa;
      text-align: center;
      margin-top: 40px;
      font-size: 15px;
    }

    /* 正则测试预览 */
    .regex-test-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      margin-top: 8px;
      box-sizing: border-box;
    }

    /* 正则替换效果代码块 */
    .regex-preview {
      background: #f4f4f4;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #333;
      min-height: 24px;
    }

    .regex-error {
      color: #c0392b;
      font-size: 12px;
      margin-top: 4px;
    }

    /* 捕获组引用高亮 */
    .capture-ref {
      display: inline-block;
      background: #e8f0fe;
      color: #1a73e8;
      padding: 1px 6px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9em;
      margin: 0 2px;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <div class="header">
      <button class="back-btn" id="backBtn" onclick="回主页()">←</button>
      <h1 id="headerTitle">🍺 酒馆</h1>
    </div>

    <!-- 主界面 -->
    <div class="page active" id="homePage">
      <div class="icon-grid">
        <div class="icon-item" onclick="导航到('character')">
          <div class="icon-svg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 4-7 8-7s8 3 8 7" />
            </svg>
          </div>
          <span class="icon-label">人设</span>
        </div>
        <div class="icon-item" onclick="导航到('worldbook')">
          <div class="icon-svg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
          </div>
          <span class="icon-label">世界书</span>
        </div>
        <div class="icon-item" onclick="导航到('regex')">
          <div class="icon-svg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </div>
          <span class="icon-label">正则查看器</span>
        </div>
        <div class="icon-item" onclick="导航到('settings')">
          <div class="icon-svg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </div>
          <span class="icon-label">设置</span>
        </div>
        <div class="icon-item" onclick="导航到('workbench')">
          <div class="icon-svg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
            </svg>
          </div>
          <span class="icon-label">工作台</span>
        </div>
      </div>
    </div>

    <!-- 人设编辑页 -->
    <div class="page" id="characterPage">
      <h2 class="subtitle">编辑人设卡</h2>
      <div class="input-group">
        <label>角色名称</label>
        <input type="text" placeholder="输入名字" id="charName">
      </div>
      <div class="input-group">
        <label>描述 / 开场白</label>
        <textarea placeholder="输入角色描述..."></textarea>
      </div>
      <button class="btn" onclick="alert('保存功能待实现')">保存人设</button>
      <p style="margin-top:20px; color:#999; font-size:14px;">这里以后可以扩展成完整的 SillyTavern 格式编辑器。</p>
    </div>

    <!-- 世界书页面 -->
    <div class="page" id="worldbookPage">
      <h2 class="subtitle">📖 世界书</h2>
      <div id="worldbookList"></div>
    </div>

    <!-- 正则查看器 -->
    <div class="page" id="regexPage">
      <h2 class="subtitle">🔍 正则查看器</h2>
      <div id="regexList"></div>
    </div>

    <!-- 设置 -->
    <div class="page" id="settingsPage">
      <h2 class="subtitle">⚙️ 设置</h2>
      <p style="color:#888;">主题、存储等设置。（功能开发中）</p>
    </div>

    <!-- 工作台 -->
    <div class="page" id="workbenchPage">
      <h2 class="subtitle">🔧 工作台</h2>
      <input type="file" id="importFileInput" accept=".json,.png" style="display:none;">
      <button class="btn" onclick="document.getElementById('importFileInput').click()">📥 导入角色卡（JSON / PNG）</button>
      <div id="importFeedback" style="margin-top:12px; font-size:14px; color:#333;"></div>
      <p style="color:#888; margin-top:20px;">快捷工具与常用入口。（功能开发中）</p>
    </div>

    <script>
      const 所有页面 = document.querySelectorAll('.page');
      const 标题栏 = document.getElementById('headerTitle');
      const 返回按钮 = document.getElementById('backBtn');

      const 页面标题映射 = {
        home: '🍺 酒馆',
        character: '人设编辑',
        worldbook: '世界书',
        regex: '正则查看器',
        settings: '设置',
        workbench: '工作台'
      };

      function 导航到(页面名) {
        所有页面.forEach(p => p.classList.remove('active'));
        const 目标页面 = document.getElementById(页面名 + 'Page');
        if (目标页面) 目标页面.classList.add('active');
        标题栏.textContent = 页面标题映射[页面名] || 页面名;
        if (页面名 !== 'home') {
          返回按钮.classList.add('show');
        }
        if (页面名 === 'character') {
          加载人设数据();
        }
        // ===== 新增这两个 =====
        if (页面名 === 'worldbook') {
          渲染世界书列表();
        }
        if (页面名 === 'regex') {
          渲染正则列表();
        }
      }

      function 回主页() {
        导航到('home');
        返回按钮.classList.remove('show');
      }

      // ========== 导入功能 ==========
      const 导入文件输入 = document.getElementById('importFileInput');
      const 反馈区 = document.getElementById('importFeedback');

      导入文件输入.addEventListener('change', async (e) => {
        const 文件 = e.target.files[0];
        if (!文件) return;
        反馈区.textContent = '正在读取...';

        try {
          let 卡数据;
          const 文件名小写 = 文件.name.toLowerCase();

          if (文件名小写.endsWith('.json')) {
            const 文本 = await 读取文件为文本(文件);
            卡数据 = JSON.parse(文本);
          } else if (文件名小写.endsWith('.png')) {
            const 缓冲区 = await 读取文件为二进制(文件);
            const 提取文本 = 从PNG提取JSON(缓冲区);
            if (!提取文本) throw new Error('PNG 中未找到角色卡数据');
            卡数据 = JSON.parse(提取文本);
          } else {
            throw new Error('不支持的文件格式：' + 文件.name);
          }

          const 人设 = 卡数据.character || 卡数据;
          let 原始世界书 = 卡数据.worldbook || 卡数据.character_book || (卡数据.data && 卡数据.data.character_book) || [];
          let 世界书;
          if (Array.isArray(原始世界书)) {
            世界书 = 原始世界书;
          } else if (原始世界书 && Array.isArray(原始世界书.entries)) {
            世界书 = 原始世界书.entries;
          } else {
            世界书 = [];
          }

          let 原始正则 = 卡数据.regex
            || (卡数据.data && 卡数据.data.extensions && 卡数据.data.extensions.regex_scripts)
            || (卡数据.extensions && 卡数据.extensions.regex_scripts)
            || [];

          // 统一字段名：把 findRegex -> find, replaceString -> replace
          let 正则;
          if (Array.isArray(原始正则)) {
            正则 = 原始正则.map(规则 => ({
              ...规则,
              find: 规则.find || 规则.findRegex || '',
              replace: 规则.replace || 规则.replaceString || ''
            }));
          } else {
            正则 = [];
          }

          localStorage.setItem('currentCharacter', JSON.stringify(人设));
          localStorage.setItem('currentWorldbook', JSON.stringify(世界书));
          localStorage.setItem('currentRegex', JSON.stringify(正则));

          const 名称 = 人设.name || 人设.data?.name || '未知';
          反馈区.innerHTML += `<br><small style="color:#888;">[调试] 正则类型：${typeof 正则}，长度：${正则.length}，首条完整数据：${JSON.stringify(正则[0] || {}).slice(0, 200)}</small>`;

          // === 调试正则数据（临时） ===
          console.log('导入的正则数据：', 正则);
          反馈区.innerHTML += `<br><small style="color:#888;">[调试] 正则类型：${typeof 正则}，长度：${正则.length}，首条预览：${JSON.stringify(正则[0] || {}).slice(0, 120)}</small>`;

        } catch (错误) {
          反馈区.textContent = '❌ 导入失败：' + 错误.message;
        }
      });

      function 读取文件为文本(文件) {
        return new Promise((完成, 拒绝) => {
          const 读取器 = new FileReader();
          读取器.onload = () => 完成(读取器.result);
          读取器.onerror = 拒绝;
          读取器.readAsText(文件);
        });
      }

      function 读取文件为二进制(文件) {
        return new Promise((完成, 拒绝) => {
          const 读取器 = new FileReader();
          读取器.onload = () => 完成(读取器.result);
          读取器.onerror = 拒绝;
          读取器.readAsArrayBuffer(文件);
        });
      }

      function 从PNG提取JSON(缓冲区) {
        const u8 = new Uint8Array(缓冲区);
        const view = new DataView(u8.buffer);
        const decoder = new TextDecoder('utf-8');
        let offset = 8;
        let rawText = '';

        while (offset < u8.length) {
          if (offset + 8 > u8.length) break;
          const length = view.getUint32(offset);
          const type = decoder.decode(u8.slice(offset + 4, offset + 8));

          if (type === 'tEXt' || type === 'iTXt') {
            const chunkData = u8.slice(offset + 8, offset + 8 + length);
            const nullIdx = chunkData.indexOf(0);
            if (nullIdx !== -1) {
              const keyword = decoder.decode(chunkData.slice(0, nullIdx));
              if (keyword === 'chara' || keyword === 'ccv3' || keyword === 'character') {
                let bytes = type === 'tEXt'
                  ? chunkData.slice(nullIdx + 1)
                  : chunkData.slice(nullIdx + 5);
                rawText = decoder.decode(bytes);
                break;
              }
            }
          }
          offset += 12 + length;
        }

        if (!rawText) throw new Error('PNG 中未找到角色卡数据');

        try {
          return decodeURIComponent(escape(atob(rawText)));
        } catch (e1) {
          try {
            JSON.parse(rawText);
            return rawText;
          } catch (e2) {
            throw new Error('角色卡数据无法解析');
          }
        }
      }

      function 加载人设数据() {
        const 保存的数据 = localStorage.getItem('currentCharacter');
        if (!保存的数据) return;
        const 人设 = JSON.parse(保存的数据);
        const 名字输入框 = document.getElementById('charName');
        const 描述文本框 = document.querySelector('#characterPage textarea');
        if (名字输入框) 名字输入框.value = 人设.name || '';
        if (描述文本框) {
          描述文本框.value = 人设.description || 人设.first_mes || '';
        }
      }

      // 渲染世界书列表
      function 渲染世界书列表() {
        const 容器 = document.getElementById('worldbookList');
        if (!容器) return;
        const 原始 = localStorage.getItem('currentWorldbook');
        if (!原始) {
          容器.innerHTML = '<div class="empty-state">还没有导入世界书</div>';
          return;
        }
        const 条目列表 = JSON.parse(原始);
        if (!Array.isArray(条目列表) || 条目列表.length === 0) {
          容器.innerHTML = '<div class="empty-state">世界书为空</div>';
          return;
        }

        let html = '';
        条目列表.forEach((条目, idx) => {
          const 名字 = 条目.comment || 条目.name || `条目 ${idx + 1}`;
          const 触发词 = Array.isArray(条目.keys) ? 条目.keys.join(', ') : (条目.key || '无');
          const 内容 = 条目.content || 条目.entry || '（无内容）';
          html += `
            <div class="wb-card">
                <div class="wb-card-header">📘 ${名字}</div>
                <div class="wb-keys">🔑 触发词：${触发词}</div>
                <div class="wb-content">${内容}</div>
            </div>
        `;
        });
        容器.innerHTML = html;
      }

      function 渲染正则列表() {
        const 容器 = document.getElementById('regexList');
        if (!容器) return;
        const 原始 = localStorage.getItem('currentRegex');
        if (!原始) {
          容器.innerHTML = '<div class="empty-state">还没有导入正则</div>';
          return;
        }
        const 正则列表 = JSON.parse(原始);
        if (!Array.isArray(正则列表) || 正则列表.length === 0) {
          容器.innerHTML = '<div class="empty-state">正则列表为空</div>';
          return;
        }

        let html = '';
        正则列表.forEach((规则, idx) => {
          const 名字 = 规则.scriptName || `规则 ${idx + 1}`;
          const 状态 = 规则.disabled ? '🔴 禁用' : '🟢 启用';
          const find = 规则.find || 规则.findRegex || '';
          const replace = 规则.replace || 规则.replaceString || '';

          // 高亮替换模板中的捕获组占位符（$1, $2, ${name}）
          const 高亮替换 = 高亮捕获组占位符(replace);

          html += `
            <div class="regex-card">
                <div><b>${名字}</b> <span style="font-size:12px;color:#888;">${状态}</span></div>
                <div class="label">查找 (Find)</div>
                <div class="regex-find">${转义HTML(find)}</div>
                <div class="label" style="margin-top:8px;">替换模板 (Replace) 🔽</div>
                <div class="regex-replace">${高亮替换}</div>
                <div class="label" style="margin-top:8px;">✨ 模板渲染效果</div>
                <div class="regex-preview" style="background:#fff; border:1px solid #eee; padding:10px; border-radius:8px; min-height:24px; white-space:pre-wrap; word-break:break-word;">
                    ${replace}
                </div>
            </div>
        `;
        });
        容器.innerHTML = html;
        // 等所有卡片插入后再处理预览区里的脚本
        正则列表.forEach((规则, idx) => {
          const cardId = `regex-card-${idx}`;
          const 预览区 = document.getElementById(`${cardId}-preview`);
          if (!预览区) return;
          const replace = 规则.replace || 规则.replaceString || '';
          预览区.innerHTML = replace; // 先放进去，静态元素生效

          // 手动执行里面的 <script> 标签
          const scripts = 预览区.querySelectorAll('script');
          scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            // 复制所有属性
            Array.from(oldScript.attributes).forEach(attr => {
              newScript.setAttribute(attr.name, attr.value);
            });
            // 复制脚本内容
            newScript.textContent = oldScript.textContent;
            // 替换掉旧的，执行新的
            oldScript.parentNode.replaceChild(newScript, oldScript);
          });
        });
      }

      // 安全转义 HTML 特殊字符
      function 转义HTML(文本) {
        const div = document.createElement('div');
        div.textContent = 文本;
        return div.innerHTML;
      }

      // 高亮替换字符串中的 $1, $2, ${name} 等
      function 高亮捕获组占位符(替换文本) {
        const 安全文本 = 转义HTML(替换文本);
        return 安全文本.replace(/(\$\{?\w+\}?)/g, '<span class="capture-ref">$1</span>');
      }

      // 根据正则表达式自动生成一段能匹配的测试文本
      function 生成测试文本(find) {
        if (!find) return '（查找字段为空）';

        // 先检查是否为纯文本（无正则特殊字符），直接返回包含它的字符串
        if (!/[.*+?^${}()|[\]\\]/.test(find.replace(/\\/g, ''))) {
          return `这里是：${find}，后面是其他内容。`;
        }

        // 构造一个正则对象，用多条常用测试文本去尝试匹配
        const re = (() => {
          try { return new RegExp(find, 'g'); } catch (e) { return null; }
        })();
        if (!re) return '（正则表达式无效）';

        const 测试文本池 = [
          'hello world 123',
          '开场白选择 另一段文字',
          '随机数字 2024 和字母 abc',
          '普通文本与<标签>测试',
          '标点符号！@#￥%……&*（）',
          '用户输入：abc123 你好世界',
          '日期：2024-12-01 时间：14:30',
          '文件名：image_01.png',
          '路径：/usr/local/bin',
          '颜色：#ff5733 和 rgb(255,0,0)',
        ];

        for (const 测试文本 of 测试文本池) {
          re.lastIndex = 0; // 重置
          if (re.test(测试文本)) {
            re.lastIndex = 0;
            return 测试文本;
          }
        }

        // 如果常用文本池全没匹配，尝试从 find 中提取“可能匹配的字面片段”并构造一个
        // 比如 \d+ 变成 123，[a-z]+ 变成 abc，但简单处理：直接返回一段包含各种字符的兜底文本
        const 兜底文本 = 'abcdefg 12345 测试文本 你好';
        re.lastIndex = 0;
        if (re.test(兜底文本)) {
          re.lastIndex = 0;
          return 兜底文本;
        }

        // 实在匹配不上，返回提示信息（预览时会原样显示，因为替换未发生）
        return '（⚠️ 当前测试文本池未匹配此正则，预览为原始替换模板）';
      }
    </script>
